doc_types:
  vision:          { path_pattern: "docs/00-overview/vision.md",          max_age_days: 365 }
  system-map:      { path_pattern: "docs/00-overview/system-map.md",      max_age_days: 180 }
  architecture:    { path_pattern: "docs/01-architecture/*.md",           max_age_days: 180 }
  adr:             { path_pattern: "docs/04-decisions/*.md",              max_age_days: 0 }    # inmutables
  api-catalog:     { path_pattern: "docs/05-apis/catalog.md",             max_age_days: 180 }
  runbook:         { path_pattern: "docs/07-operations/*.md",             max_age_days: 180 }
  onboarding:      { path_pattern: "docs/08-onboarding/developer-setup.md", max_age_days: 180 }
  piece-readme:    { path_pattern: "docs/pieces/*/README.md",             max_age_days: 180 }
  glossary:        { path_pattern: "GLOSSARY.md",                         max_age_days: 365 }
  gap-report:      { path_pattern: "GAP-REPORT.md",                       max_age_days: 90 }

required_docs:
  solution: [vision, system-map, architecture, adr, api-catalog, runbook, onboarding, glossary, gap-report]
  per_domain: [piece-readme]

